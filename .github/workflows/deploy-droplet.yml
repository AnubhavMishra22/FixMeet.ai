# Deploy FixMeet backend to DigitalOcean Droplet on push to main
# Build-only validation on PRs (no deploy)
# Required secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY
name: Deploy to Droplet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  # Option A: Build-only validation on PRs - no deploy
  build:
    name: Build backend (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install and build
        working-directory: backend
        run: |
          npm ci
          npm run build

  # Deploy only on push to main (not on PRs)
  deploy:
    name: Deploy to api.fixmeet.app
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /root/FixMeet.ai
            git fetch origin main
            git reset --hard origin/main
            cd backend
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm ci
            npm run build
            pm2 restart fixmeet-api --update-env

      - name: Health check
        run: |
          echo "Waiting for app to start..."
          for i in 1 2 3 4 5 6; do
            if curl -sf https://api.fixmeet.app/health; then
              echo ""
              echo "Deployment successful!"
              exit 0
            fi
            if [ "$i" -lt 6 ]; then
              echo "Attempt $i/6 failed. Retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "Health check failed after 30 seconds."
          exit 1
